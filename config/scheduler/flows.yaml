# ==========================================
# 全局元数据：定义这个测试套件的基本信息
# ==========================================
name: "Radio_HAL_Full_Validation_Suite"
version: "1.0.0"
description: "DAB 业务逻辑全流程自动化测试"

# ==========================================
# 未使用的全局设置项（保留以备后续扩展）
# ==========================================
config:
  stop_on_failure: true         
  enable_checkpoint: true       
  output_dir: "./test_results"  

# ==========================================
# 未使用的全局设置项（保留以备后续扩展）
# ==========================================
env:
  device_id: "android_board_01"
  frequency_band: "BAND_III"
  log_level: "DEBUG"

# ==========================================
# 测试流水线：定义执行顺序和对应的模块文件
# ==========================================

pipeline:
  - step: 01_START_ODR
    name: "START ODR"
    module_config: "modules/start_odr.yaml"

#   - step: 02_SCAN_DAB_SERVICE
#     name: "SCAN DAB Service"
#     module_config: "modules/scan.yaml"

#   - step: 03_SELECT_DAB_SERVICE
#     name: "SELECT DAB Service"
#     module_config: "modules/select.yaml"
  
#   - step: 04_ANNOUNCEMENT
#     name: "ANNOUNCEMENT"
#     module_config: "modules/announcement.yaml"
# # ==========================================
# 后置处理：定义测试完成后的操作，如生成报告等,未使用（保留以备后续扩展）
# ==========================================
post_actions:
  - name: "生成测试报告"
    module_config: "modules/reporter.yaml"